name: Refresh WC results

# Every 30 minutes: pull the latest official results + Golden Boot from
# Wikipedia, regenerate the data files, and commit only if something changed.
# A commit triggers Vercel to rebuild and redeploy povatlas.com.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh results + scorers from Wikipedia
        run: node scripts/refresh-results.mjs

      - name: Commit & push if data changed
        run: |
          if [ -n "$(git status --porcelain src/data/matches.ts src/data/topScorers.ts)" ]; then
            git config user.name "povatlas-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/matches.ts src/data/topScorers.ts
            git commit -m "chore: auto-refresh WC results & scorers"
            git push
            echo "Pushed updated data."
          else
            echo "No data changes; nothing to commit."
          fi
